name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Download Android SDK Command-line Tools
      run: |
        mkdir -p $HOME/android-sdk
        cd $HOME/android-sdk
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        rm commandlinetools-linux-11076708_latest.zip
    
    - name: Setup Android SDK Environment
      run: |
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/cmdline-tools/bin:$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
    
    - name: Install Android SDK Components
      run: |
        # Accept licenses
        yes | $HOME/android-sdk/cmdline-tools/bin/sdkmanager --licenses
        # Install components
        $HOME/android-sdk/cmdline-tools/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"
    
    - name: Build Server APK
      run: chmod +x build_apk.sh && bash build_apk.sh
    
    - name: Upload Server APK
      uses: actions/upload-artifact@v4
      with:
        name: server-apk
        path: |
          Server/build/outputs/apk/debug/*.apk
          Server/bin/*.apk
      if: always()
